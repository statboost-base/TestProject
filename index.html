<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Enduro HTML5</title>
<style>
  :root { --scale: 1; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #101014;
    color: #e8e8e8;
    font-family: "Press Start 2P", "Courier New", monospace;
    -webkit-font-smoothing: none;
    image-rendering: pixelated;
    overflow: hidden;
  }
  #wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    padding: 10px;
  }
  #stage {
    position: relative;
    box-shadow: 0 0 0 4px #2a2a30, 0 12px 40px rgba(0,0,0,0.6);
    border-radius: 6px;
    background: #000;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    border-radius: 4px;
    touch-action: none;
  }
  #hud-help {
    font-size: 11px;
    color: #8a8a92;
    text-align: center;
    line-height: 1.6;
    max-width: 480px;
  }
  #hud-help b { color: #d8d860; }
  /* Overlay screens */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: rgba(8, 10, 20, 0.82);
    color: #fff;
    gap: 18px;
    padding: 24px;
    border-radius: 4px;
  }
  .overlay.hidden { display: none; }
  .overlay h1 { font-size: 28px; letter-spacing: 2px; color: #ffd23f; text-shadow: 3px 3px 0 #b8860b; }
  .overlay h2 { font-size: 18px; color: #6cf; }
  .overlay p  { font-size: 12px; line-height: 1.9; color: #d8d8e0; }
  .overlay .big { font-size: 16px; color: #8f8; }
  .overlay .bad { font-size: 16px; color: #f88; }
  .btn {
    font-family: inherit;
    font-size: 13px;
    color: #101014;
    background: #ffd23f;
    border: none;
    padding: 12px 22px;
    border-radius: 4px;
    cursor: pointer;
    box-shadow: 0 4px 0 #b8860b;
    transition: transform .05s, box-shadow .05s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #b8860b; }
  .kbd {
    display: inline-block;
    background: #2a2a30;
    border: 1px solid #44444c;
    border-bottom-width: 3px;
    border-radius: 4px;
    padding: 2px 7px;
    color: #ffd23f;
    margin: 0 1px;
  }
  /* Touch controls */
  #touch {
    position: absolute;
    inset: 0;
    display: none;
    pointer-events: none;
  }
  #touch.on { display: block; }
  .tbtn {
    position: absolute;
    bottom: 14px;
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: rgba(255,255,255,0.14);
    border: 2px solid rgba(255,255,255,0.35);
    color: #fff;
    font-size: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: auto;
    user-select: none;
    -webkit-user-select: none;
  }
  .tbtn:active { background: rgba(255,255,255,0.3); }
  #t-left  { left: 14px; }
  #t-right { left: 90px; }
  #t-gas   { right: 14px; }
  #t-brake { right: 90px; bottom: 14px; }
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="game" width="320" height="240"></canvas>

    <div id="touch">
      <div class="tbtn" id="t-left">◀</div>
      <div class="tbtn" id="t-right">▶</div>
      <div class="tbtn" id="t-brake">▼</div>
      <div class="tbtn" id="t-gas">▲</div>
    </div>

    <div id="start" class="overlay">
      <h1>ENDURO</h1>
      <h2>HTML5 Edition</h2>
      <p>
        Pass <b style="color:#8f8">200</b> cars on Day 1,<br>
        then <b style="color:#8f8">300</b> every day after.<br>
        Survive sun, dusk, night, fog, ice &amp; snow.
      </p>
      <button class="btn" id="startBtn">▶ START RACE</button>
      <p style="color:#8a8a92">
        <span class="kbd">←</span><span class="kbd">→</span> steer &nbsp;
        <span class="kbd">↑</span> gas &nbsp;
        <span class="kbd">↓</span> brake &nbsp;
        <span class="kbd">P</span> pause
      </p>
    </div>

    <div id="dayend" class="overlay hidden"></div>
    <div id="gameover" class="overlay hidden"></div>
    <div id="pause" class="overlay hidden">
      <h1>PAUSED</h1>
      <button class="btn" id="resumeBtn">▶ RESUME</button>
    </div>
  </div>

  <div id="hud-help">
    Reach the daily car quota before the day ends. Crashes cost speed.
    <b>Don't run out of road time!</b>
  </div>
</div>

<script>
"use strict";
(function () {
  // ---------------------------------------------------------------------------
  // Enduro HTML5 — a pseudo-3D recreation of the 1983 NES/Atari racing classic.
  // Single-file, no dependencies. Renders to a 320x240 canvas scaled up by CSS.
  // ---------------------------------------------------------------------------

  const W = 320, H = 240;
  const HORIZON = 89;                 // y of the horizon line
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;

  // Scale the canvas up to fit the viewport while staying crisp / pixelated.
  function fitCanvas() {
    const maxW = Math.min(window.innerWidth - 24, 720);
    const maxH = window.innerHeight - 120;
    let s = Math.max(1, Math.min(maxW / W, maxH / H));
    s = Math.floor(s * 2) / 2;        // half-pixel steps keep it sharp
    canvas.style.width = (W * s) + "px";
    canvas.style.height = (H * s) + "px";
  }
  window.addEventListener("resize", fitCanvas);

  // --- Road / projection constants -------------------------------------------
  const ROAD_W = 1.55;                // half-width of road in world units
  const SEG_LEN = 6;                  // length of one road segment (z units)
  const DRAW_SEGS = 220;              // how many segments to project per frame
  const CAM_DEPTH = 0.84;             // camera depth (focal length-ish)
  const CAM_H = 1.0;                  // camera height above road

  // --- Speed model ------------------------------------------------------------
  const MAX_SPEED = SEG_LEN * 70;     // top speed (z per second)
  const ACCEL = MAX_SPEED / 4.0;
  const BRAKE = -MAX_SPEED / 1.6;
  const DECEL = -MAX_SPEED / 5.0;     // coasting friction
  const OFFROAD_DECEL = -MAX_SPEED / 1.4;
  const OFFROAD_MAX = MAX_SPEED / 3.2;
  const CRASH_SPEED = MAX_SPEED / 5;  // speed dropped to after a hard crash

  // --- Time-of-day phases (drive the palette + weather) ----------------------
  // Each phase lasts a number of "car frames"; they cycle: the look of Enduro.
  const PHASES = [
    { name: "Morning", len: 90 },
    { name: "Day",     len: 130 },
    { name: "Dusk",    len: 70 },
    { name: "Night",   len: 120 },
    { name: "Fog",     len: 70 },
    { name: "Snow",    len: 90 },
    { name: "Ice",     len: 70 },
  ];

  // ---------------------------------------------------------------------------
  // Game state
  // ---------------------------------------------------------------------------
  const game = {
    state: "menu",                    // menu | playing | dayend | gameover | paused
    pos: 0,                           // camera z position along track
    playerX: 0,                       // -1..1 lateral position (road = +/-1)
    speed: 0,
    day: 1,
    quota: 200,
    passed: 0,                        // cars passed today
    dayTimer: 0,                      // counts down the in-game "day"
    dayLength: 0,
    phaseIdx: 0,
    phaseTime: 0,
    cars: [],                         // rival cars on the track
    spawnTimer: 0,
    curve: 0,                         // current track curvature
    targetCurve: 0,
    curveTimer: 0,
    hill: 0,
    targetHill: 0,
    score: 0,
    best: Number(localStorage.getItem("enduro_best") || 0),
    crashFlash: 0,
    bounce: 0,                        // crash recoil on playerX
    snowFlakes: [],
    steer: 0,
  };

  // ---------------------------------------------------------------------------
  // Input
  // ---------------------------------------------------------------------------
  const keys = { left: false, right: false, gas: false, brake: false };
  const KEYMAP = {
    ArrowLeft: "left", a: "left", A: "left",
    ArrowRight: "right", d: "right", D: "right",
    ArrowUp: "gas", w: "gas", W: "gas",
    ArrowDown: "brake", s: "brake", S: "brake",
  };
  window.addEventListener("keydown", (e) => {
    if (e.key === "p" || e.key === "P") { togglePause(); return; }
    const k = KEYMAP[e.key];
    if (k) { keys[k] = true; e.preventDefault(); }
    if ((e.key === "Enter" || e.key === " ") && game.state === "menu") startGame();
  });
  window.addEventListener("keyup", (e) => {
    const k = KEYMAP[e.key];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  // Touch controls
  const touchWrap = document.getElementById("touch");
  function bindTouch(id, key) {
    const el = document.getElementById(id);
    const set = (v) => (ev) => { keys[key] = v; ev.preventDefault(); };
    el.addEventListener("touchstart", set(true), { passive: false });
    el.addEventListener("touchend", set(false), { passive: false });
    el.addEventListener("touchcancel", set(false), { passive: false });
    el.addEventListener("mousedown", set(true));
    el.addEventListener("mouseup", set(false));
    el.addEventListener("mouseleave", set(false));
  }
  bindTouch("t-left", "left");
  bindTouch("t-right", "right");
  bindTouch("t-gas", "gas");
  bindTouch("t-brake", "brake");
  if ("ontouchstart" in window) touchWrap.classList.add("on");

  // ---------------------------------------------------------------------------
  // Overlays / buttons
  // ---------------------------------------------------------------------------
  const elStart = document.getElementById("start");
  const elDayEnd = document.getElementById("dayend");
  const elGameOver = document.getElementById("gameover");
  const elPause = document.getElementById("pause");
  document.getElementById("startBtn").addEventListener("click", startGame);
  document.getElementById("resumeBtn").addEventListener("click", togglePause);

  function hideAll() {
    elStart.classList.add("hidden");
    elDayEnd.classList.add("hidden");
    elGameOver.classList.add("hidden");
    elPause.classList.add("hidden");
  }

  // ---------------------------------------------------------------------------
  // Game flow
  // ---------------------------------------------------------------------------
  function startGame() {
    game.state = "playing";
    game.day = 1;
    game.quota = 200;
    game.passed = 0;
    game.score = 0;
    game.speed = 0;
    game.pos = 0;
    game.playerX = 0;
    game.cars = [];
    game.snowFlakes = [];
    game.curve = game.targetCurve = 0;
    game.hill = game.targetHill = 0;
    game.phaseIdx = 0;
    game.phaseTime = 0;
    startDay();
    hideAll();
  }

  function startDay() {
    game.passed = 0;
    game.dayLength = 65 + game.day * 4;     // seconds of road time for the day
    game.dayTimer = game.dayLength;
    game.spawnTimer = 0;
    game.cars = [];
    game.phaseTime = 0;
  }

  function endDay(success) {
    if (success) {
      game.state = "dayend";
      const carry = Math.max(0, game.passed - game.quota);
      elDayEnd.innerHTML =
        `<h1>DAY ${game.day} CLEARED!</h1>` +
        `<p class="big">${game.passed} cars passed &nbsp;|&nbsp; quota ${game.quota}</p>` +
        `<p>Time bonus: <b style="color:#8f8">+${Math.round(game.dayTimer) * 50}</b></p>` +
        `<p>Total score: <b style="color:#ffd23f">${game.score}</b></p>` +
        `<button class="btn" id="nextDayBtn">▶ DAY ${game.day + 1}</button>`;
      elDayEnd.classList.remove("hidden");
      document.getElementById("nextDayBtn").addEventListener("click", nextDay);
    } else {
      gameOver();
    }
  }

  function nextDay() {
    game.day += 1;
    game.quota = 300;                 // every day after the first needs 300
    game.speed = 0;
    startDay();
    game.state = "playing";
    hideAll();
  }

  function gameOver() {
    game.state = "gameover";
    if (game.score > game.best) {
      game.best = game.score;
      localStorage.setItem("enduro_best", String(game.best));
    }
    elGameOver.innerHTML =
      `<h1>GAME OVER</h1>` +
      `<p class="bad">You reached Day ${game.day}</p>` +
      `<p>Cars passed today: ${game.passed} / ${game.quota}</p>` +
      `<p>Score: <b style="color:#ffd23f">${game.score}</b></p>` +
      `<p>Best: <b style="color:#8f8">${game.best}</b></p>` +
      `<button class="btn" id="retryBtn">▶ RACE AGAIN</button>`;
    elGameOver.classList.remove("hidden");
    document.getElementById("retryBtn").addEventListener("click", startGame);
  }

  function togglePause() {
    if (game.state === "playing") {
      game.state = "paused";
      elPause.classList.remove("hidden");
    } else if (game.state === "paused") {
      game.state = "playing";
      elPause.classList.add("hidden");
    }
  }

  // ---------------------------------------------------------------------------
  // Palettes per phase. Returns colors for sky, ground, road, grass, fog, etc.
  // ---------------------------------------------------------------------------
  function phase() { return PHASES[game.phaseIdx]; }

  function palette() {
    const name = phase().name;
    // t = fraction through the phase, for smooth dusk gradients
    switch (name) {
      case "Morning": return {
        sky1: "#f7b267", sky2: "#a8d0e6", ground: "#3a8f3a",
        road1: "#6b6b73", road2: "#5a5a62", rumble1: "#d8d8d8", rumble2: "#c43",
        lane: "#e8e8e8", grass1: "#2f7d32", grass2: "#276127", fog: null, night: 0 };
      case "Day": return {
        sky1: "#5ab9ea", sky2: "#9bd3f0", ground: "#3a9d3a",
        road1: "#73737b", road2: "#62626a", rumble1: "#ffffff", rumble2: "#d33",
        lane: "#ffffff", grass1: "#34a336", grass2: "#2a7f2c", fog: null, night: 0 };
      case "Dusk": return {
        sky1: "#ff7b54", sky2: "#7d4a8c", ground: "#5a4a3a",
        road1: "#5e5560", road2: "#4e4750", rumble1: "#ffd0a0", rumble2: "#a22",
        lane: "#ffcc99", grass1: "#5a6a32", grass2: "#46521f", fog: null, night: 0.25 };
      case "Night": return {
        sky1: "#0a0a26", sky2: "#1a1a3a", ground: "#101020",
        road1: "#2a2a36", road2: "#22222e", rumble1: "#8a8a9a", rumble2: "#553",
        lane: "#c8c860", grass1: "#15201a", grass2: "#101a14", fog: null, night: 0.8 };
      case "Fog": return {
        sky1: "#b8c0c4", sky2: "#cdd4d8", ground: "#8a9590",
        road1: "#70747a", road2: "#62666c", rumble1: "#e8e8e8", rumble2: "#b55",
        lane: "#f0f0f0", grass1: "#7c8a7e", grass2: "#6c7a6e", fog: "#cdd4d8", night: 0 };
      case "Snow": return {
        sky1: "#dfe7ee", sky2: "#c2cdd6", ground: "#e8edf2",
        road1: "#8c9096", road2: "#7c8086", rumble1: "#ffffff", rumble2: "#a44",
        lane: "#ffffff", grass1: "#e0e8ee", grass2: "#cdd6de", fog: "#eef3f7", night: 0 };
      case "Ice": return {
        sky1: "#9fc8d8", sky2: "#bfe0ea", ground: "#cfe4ea",
        road1: "#9aa6ac", road2: "#8a96a0", rumble1: "#ffffff", rumble2: "#6ac",
        lane: "#e0f0ff", grass1: "#bcd8e0", grass2: "#a8c8d2", fog: null, night: 0 };
    }
  }

  // Mix two hex colors. f in 0..1.
  function mix(a, b, f) {
    const ai = parseInt(a.slice(1), 16), bi = parseInt(b.slice(1), 16);
    const ar = ai >> 16, ag = (ai >> 8) & 255, ab = ai & 255;
    const br = bi >> 16, bg = (bi >> 8) & 255, bb = bi & 255;
    const r = Math.round(ar + (br - ar) * f);
    const g = Math.round(ag + (bg - ag) * f);
    const bl = Math.round(ab + (bb - ab) * f);
    return "rgb(" + r + "," + g + "," + bl + ")";
  }

  // ---------------------------------------------------------------------------
  // Update
  // ---------------------------------------------------------------------------
  function update(dt) {
    if (game.state !== "playing") return;

    const slippery = phase().name === "Ice";
    const foggy = phase().name === "Fog";

    // --- Speed ----------------------------------------------------------------
    const onRoad = Math.abs(game.playerX) < 1.0;
    if (keys.gas) {
      game.speed += ACCEL * dt;
    } else if (keys.brake) {
      game.speed += BRAKE * dt;
    } else {
      game.speed += DECEL * dt;
    }
    if (!onRoad) {
      game.speed += OFFROAD_DECEL * dt;
      if (game.speed > OFFROAD_MAX) game.speed = OFFROAD_MAX;
    }
    if (game.speed < 0) game.speed = 0;
    if (game.speed > MAX_SPEED) game.speed = MAX_SPEED;

    // --- Steering -------------------------------------------------------------
    const speedFrac = game.speed / MAX_SPEED;
    const steerRate = (slippery ? 0.9 : 1.7) * dt;
    let targetSteer = 0;
    if (keys.left) targetSteer = -1;
    if (keys.right) targetSteer = 1;
    // On ice the steering input is sluggish to apply and slow to release.
    if (slippery) {
      game.steer += (targetSteer - game.steer) * 2.0 * dt;
    } else {
      game.steer = targetSteer;
    }
    game.playerX += game.steer * steerRate * (0.35 + speedFrac);

    // Curve pushes the car outward at speed (centrifugal feel).
    game.playerX -= game.curve * speedFrac * 1.6 * dt;

    // Crash recoil settles back toward where you were.
    if (game.bounce !== 0) {
      game.playerX += game.bounce * dt;
      game.bounce *= Math.pow(0.02, dt);
      if (Math.abs(game.bounce) < 0.05) game.bounce = 0;
    }

    // Clamp so you can drift onto the shoulder but not infinitely far.
    if (game.playerX < -2) game.playerX = -2;
    if (game.playerX > 2) game.playerX = 2;

    // --- Track curvature / hills generation ----------------------------------
    game.curveTimer -= dt;
    if (game.curveTimer <= 0) {
      game.curveTimer = 2 + Math.random() * 4;
      const r = Math.random();
      game.targetCurve = r < 0.4 ? 0 : (Math.random() * 2 - 1) * 2.2;
      game.targetHill = (Math.random() * 2 - 1) * 25;
    }
    game.curve += (game.targetCurve - game.curve) * 1.2 * dt;
    game.hill += (game.targetHill - game.hill) * 1.0 * dt;

    // --- Advance along the track ---------------------------------------------
    game.pos += game.speed * dt;
    const trackLen = DRAW_SEGS * SEG_LEN * 4;
    if (game.pos >= trackLen) game.pos -= trackLen;

    // --- Day timer & phase cycling -------------------------------------------
    game.dayTimer -= dt;
    game.phaseTime += dt;
    if (game.phaseTime > 8) {          // rotate scenery roughly every 8s
      game.phaseTime = 0;
      game.phaseIdx = (game.phaseIdx + 1) % PHASES.length;
    }

    // --- Rival cars -----------------------------------------------------------
    updateCars(dt, foggy);

    // --- Win / lose the day ---------------------------------------------------
    if (game.passed >= game.quota && game.dayTimer > 0) {
      // Quota met: let the clock run out for the time bonus, but mark cleared.
    }
    if (game.dayTimer <= 0) {
      game.dayTimer = 0;
      endDay(game.passed >= game.quota);
    }

    // --- Effects --------------------------------------------------------------
    if (game.crashFlash > 0) game.crashFlash -= dt;
    updateSnow(dt);
  }

  function updateCars(dt, foggy) {
    // Spawn cars ahead. Higher player speed => denser traffic to pass.
    game.spawnTimer -= dt;
    const spawnEvery = 0.55 - Math.min(0.3, game.speed / MAX_SPEED * 0.35);
    if (game.spawnTimer <= 0 && game.cars.length < 14) {
      game.spawnTimer = spawnEvery;
      game.cars.push({
        z: game.pos + (DRAW_SEGS * SEG_LEN) * (0.55 + Math.random() * 0.4),
        x: (Math.random() * 1.6 - 0.8),
        speed: MAX_SPEED * (0.18 + Math.random() * 0.22),
        color: ["#e23", "#28e", "#ed3", "#2c5", "#e82", "#c4e"][Math.floor(Math.random() * 6)],
        passed: false,
      });
    }

    const passZone = game.pos;
    for (let i = game.cars.length - 1; i >= 0; i--) {
      const c = game.cars[i];
      c.z += c.speed * dt;             // rivals also move forward (slower)

      // Mark as passed when the player overtakes it.
      if (!c.passed && c.z < passZone) {
        c.passed = true;
        game.passed += 1;
        game.score += 25;
      }

      // Collision: close in z and overlapping in x.
      const dz = c.z - game.pos;
      if (dz > -SEG_LEN * 1.5 && dz < SEG_LEN * 3.5) {
        if (Math.abs(c.x - game.playerX) < 0.55 && game.speed > c.speed) {
          // Crash — drop speed, bounce sideways, flash.
          game.speed = Math.min(game.speed, CRASH_SPEED);
          game.bounce = (game.playerX > c.x ? 1 : -1) * 3.2;
          game.crashFlash = 0.25;
          c.speed = game.speed * 0.6;
        }
      }

      // Recycle cars that fall far behind.
      if (c.z < game.pos - SEG_LEN * 8) game.cars.splice(i, 1);
    }
  }

  function updateSnow(dt) {
    const snowing = phase().name === "Snow";
    if (snowing) {
      while (game.snowFlakes.length < 60) {
        game.snowFlakes.push({
          x: Math.random() * W, y: Math.random() * H,
          vx: -20 - Math.random() * 30, vy: 40 + Math.random() * 60,
          r: Math.random() < 0.5 ? 1 : 2,
        });
      }
    }
    for (let i = game.snowFlakes.length - 1; i >= 0; i--) {
      const f = game.snowFlakes[i];
      f.x += (f.vx - game.speed * 0.05) * dt;
      f.y += f.vy * dt;
      if (f.y > H || f.x < -4) {
        if (snowing) { f.x = Math.random() * W + 20; f.y = -4; }
        else game.snowFlakes.splice(i, 1);
      }
    }
  }

  // ---------------------------------------------------------------------------
  // Rendering — pseudo-3D projected road.
  // ---------------------------------------------------------------------------
  function project(camZ, segZ, dx, dy) {
    // Returns screen {x, y, w, scale} for a point at world (dx height dy) at segZ.
    const dz = segZ - camZ;
    const scale = CAM_DEPTH / Math.max(0.1, dz / 100);
    const x = Math.round(W / 2 + scale * dx * W / 2);
    const y = Math.round(HORIZON - scale * (dy - CAM_H) * H / 2);
    const w = scale * ROAD_W * W / 2;
    return { x, y, w, scale };
  }

  function render() {
    const p = palette();

    // --- Sky ------------------------------------------------------------------
    const sky = ctx.createLinearGradient(0, 0, 0, HORIZON);
    sky.addColorStop(0, p.sky1);
    sky.addColorStop(1, p.sky2);
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, HORIZON);

    // Sun / moon
    drawCelestial(p);

    // --- Ground (below horizon) ----------------------------------------------
    ctx.fillStyle = p.ground;
    ctx.fillRect(0, HORIZON, W, H - HORIZON);

    if (game.state === "menu") { renderMenuRoad(p); finishFog(p); return; }

    // --- Road segments, back to front ----------------------------------------
    const baseSeg = Math.floor(game.pos / SEG_LEN);
    let curveAccum = 0;
    let dCurve = 0;
    let prev = null;

    // Pre-walk to accumulate curve so distant road bends.
    for (let n = 0; n < DRAW_SEGS; n++) {
      const segIndex = baseSeg + n;
      const segZ = (segIndex + 1) * SEG_LEN;

      // Curvature & hills vary smoothly with a little procedural noise.
      const cv = game.curve + Math.sin(segIndex * 0.05) * 0.6;
      const hl = game.hill + Math.sin(segIndex * 0.07) * 8;
      dCurve += cv * 0.012;
      curveAccum += dCurve;

      const worldDx = curveAccum * 0.6 - game.playerX * 1.0;
      const worldDy = hl * 0.01;

      const pr = project(game.pos, segZ, worldDx, worldDy);
      if (prev && pr.y < prev.y && pr.y < HORIZON + 2) {
        drawSegment(prev, pr, segIndex, p);
      }
      prev = pr;
      if (pr.y < 2) break;            // reached top of screen
    }

    // --- Rival cars (far to near so nearer overdraw) -------------------------
    drawCars(p);

    // --- Player car -----------------------------------------------------------
    drawPlayer(p);

    // --- Weather + HUD --------------------------------------------------------
    finishFog(p);
    drawSnow();
    if (game.crashFlash > 0) {
      ctx.fillStyle = "rgba(255,80,40," + (game.crashFlash * 1.6) + ")";
      ctx.fillRect(0, 0, W, H);
    }
    drawHUD(p);
  }

  function drawSegment(a, b, segIndex, p) {
    const dark = (Math.floor(segIndex / 3) % 2) === 0;
    const grass = dark ? p.grass1 : p.grass2;
    const road = dark ? p.road1 : p.road2;
    const rumble = dark ? p.rumble1 : p.rumble2;

    // Grass fills the whole horizontal band.
    ctx.fillStyle = grass;
    ctx.fillRect(0, b.y, W, a.y - b.y + 1);

    // Road trapezoid.
    poly(ctx, road,
      a.x - a.w, a.y, a.x + a.w, a.y,
      b.x + b.w, b.y, b.x - b.w, b.y);

    // Rumble strips.
    const r1a = a.w * 1.12, r1b = b.w * 1.12;
    poly(ctx, rumble, a.x - r1a, a.y, a.x - a.w, a.y, b.x - b.w, b.y, b.x - r1b, b.y);
    poly(ctx, rumble, a.x + a.w, a.y, a.x + r1a, a.y, b.x + r1b, b.y, b.x + b.w, b.y);

    // Center lane dashes.
    if (dark && a.w > 2) {
      const la = a.w * 0.04, lb = b.w * 0.04;
      poly(ctx, p.lane, a.x - la, a.y, a.x + la, a.y, b.x + lb, b.y, b.x - lb, b.y);
    }
  }

  function poly(ctx, color, x1, y1, x2, y2, x3, y3, x4, y4) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.lineTo(x3, y3);
    ctx.lineTo(x4, y4);
    ctx.closePath();
    ctx.fill();
  }

  function drawCelestial(p) {
    const night = p.night || 0;
    if (phase().name === "Fog" || phase().name === "Snow") return;
    if (night > 0.5) {
      // Moon
      ctx.fillStyle = "#eef0d8";
      circle(250, 30, 11);
      ctx.fillStyle = p.sky1;
      circle(245, 27, 9);
    } else {
      // Sun
      const sunY = phase().name === "Dusk" ? 60 : 34;
      ctx.fillStyle = phase().name === "Dusk" ? "#ffcf6b" : "#fff3b0";
      circle(70, sunY, 14);
      ctx.globalAlpha = 0.35;
      circle(70, sunY, 20);
      ctx.globalAlpha = 1;
    }
  }

  function circle(x, y, r) {
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawCars(p) {
    // Sort far-to-near.
    const sorted = game.cars.slice().sort((a, b) => b.z - a.z);
    for (const c of sorted) {
      const dz = c.z - game.pos;
      if (dz < 1 || dz > DRAW_SEGS * SEG_LEN) continue;
      const curveOffset = curveAt(dz);
      const pr = project(game.pos, c.z, curveOffset + (c.x - game.playerX), 0);
      if (pr.y < HORIZON || pr.y > H) continue;
      const cw = Math.max(3, pr.w * 0.62);
      const ch = cw * 0.7;
      drawCarSprite(pr.x, pr.y, cw, ch, c.color, p);
    }
  }

  // Approximate the lateral curve offset a rival sits at, matching the road.
  function curveAt(dz) {
    const n = dz / SEG_LEN;
    return (game.curve * 0.5) * (n * n) * 0.0009;
  }

  function drawCarSprite(cx, cy, w, h, color, p) {
    const x = Math.round(cx - w / 2), y = Math.round(cy - h);
    // Shadow
    ctx.fillStyle = "rgba(0,0,0,0.3)";
    ctx.fillRect(x, Math.round(cy - h * 0.18), Math.round(w), Math.round(h * 0.3));
    // Body
    ctx.fillStyle = color;
    ctx.fillRect(x, y, Math.round(w), Math.round(h));
    // Cabin
    ctx.fillStyle = mix("#000000", color, 0.55);
    ctx.fillRect(Math.round(x + w * 0.2), Math.round(y + h * 0.12),
                 Math.round(w * 0.6), Math.round(h * 0.4));
    // Tail lights at night
    if ((p.night || 0) > 0.4) {
      ctx.fillStyle = "#ff5555";
      ctx.fillRect(x + 1, Math.round(y + h * 0.6), 2, 2);
      ctx.fillRect(Math.round(x + w - 3), Math.round(y + h * 0.6), 2, 2);
    }
  }

  function drawPlayer(p) {
    const cx = W / 2 + game.playerX * 6;   // slight visual sway
    const baseY = H - 30;
    const w = 46, h = 26;
    const x = Math.round(cx - w / 2), y = Math.round(baseY - h);

    // Tilt the car with steering.
    const tilt = game.steer * 3;

    // Shadow
    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.fillRect(x - 2, baseY - 4, w + 4, 8);

    // Rear wing / body
    ctx.fillStyle = "#d33";
    ctx.fillRect(x, y + 6, w, h - 6);
    ctx.fillStyle = "#b22";
    ctx.fillRect(x, y + h - 6, w, 6);          // shadow band
    // Cockpit
    ctx.fillStyle = "#222";
    ctx.fillRect(Math.round(x + w * 0.32 + tilt), y + 2, Math.round(w * 0.36), 10);
    // Rear wing
    ctx.fillStyle = "#900";
    ctx.fillRect(x - 2, y + 4, w + 4, 4);
    // Wheels
    ctx.fillStyle = "#111";
    ctx.fillRect(x - 3, y + h - 8, 6, 10);
    ctx.fillRect(x + w - 3, y + h - 8, 6, 10);
    // Brake glow
    if (keys.brake) {
      ctx.fillStyle = "#ff5";
      ctx.fillRect(x + 4, y + h - 3, 5, 3);
      ctx.fillRect(x + w - 9, y + h - 3, 5, 3);
    }
    // Headlight cones at night
    if ((p.night || 0) > 0.5) {
      ctx.fillStyle = "rgba(255,255,200,0.07)";
      poly(ctx, "rgba(255,255,200,0.07)",
        x + 6, y, x + w - 6, y, W / 2 + 60, HORIZON, W / 2 - 60, HORIZON);
    }
  }

  function finishFog(p) {
    if (!p.fog) return;
    // Fog: thick near the horizon, clearing toward the player.
    const g = ctx.createLinearGradient(0, HORIZON - 30, 0, H);
    g.addColorStop(0, p.fog);
    g.addColorStop(0.4, p.fog);
    g.addColorStop(1, "rgba(205,212,216,0.05)");
    ctx.globalAlpha = 0.85;
    ctx.fillStyle = g;
    ctx.fillRect(0, HORIZON - 30, W, H - HORIZON + 30);
    ctx.globalAlpha = 1;
  }

  function drawSnow() {
    ctx.fillStyle = "#ffffff";
    for (const f of game.snowFlakes) {
      ctx.fillRect(Math.round(f.x), Math.round(f.y), f.r, f.r);
    }
  }

  function renderMenuRoad(p) {
    // A simple static road for the menu backdrop.
    let prev = null;
    for (let n = 0; n < DRAW_SEGS; n++) {
      const segZ = (n + 1) * SEG_LEN;
      const pr = project(0, segZ, Math.sin(n * 0.05) * n * 0.004, Math.sin(n * 0.04) * 0.05);
      if (prev && pr.y < prev.y) drawSegment(prev, pr, n, p);
      prev = pr;
      if (pr.y < 2) break;
    }
  }

  // ---------------------------------------------------------------------------
  // HUD — speed bar, cars-to-go flag, day, clock, score.
  // ---------------------------------------------------------------------------
  function drawHUD(p) {
    // Bottom info strip
    ctx.fillStyle = "rgba(0,0,0,0.55)";
    ctx.fillRect(0, H - 18, W, 18);

    ctx.textBaseline = "middle";
    ctx.font = "8px 'Courier New', monospace";

    // Cars to pass (the iconic flag counter)
    const left = Math.max(0, game.quota - game.passed);
    ctx.fillStyle = "#ffd23f";
    ctx.textAlign = "left";
    ctx.fillText("CARS", 6, H - 12);
    ctx.fillStyle = left > 0 ? "#fff" : "#6f6";
    ctx.font = "bold 9px 'Courier New', monospace";
    ctx.fillText(left > 0 ? String(left).padStart(3, "0") : "DONE!", 32, H - 12);

    // Day
    ctx.fillStyle = "#9cf";
    ctx.font = "8px 'Courier New', monospace";
    ctx.textAlign = "center";
    ctx.fillText("DAY " + game.day, W / 2 - 30, H - 12);

    // Phase / weather
    ctx.fillStyle = "#cfc";
    ctx.fillText(phase().name.toUpperCase(), W / 2 + 28, H - 12);

    // Score
    ctx.fillStyle = "#fff";
    ctx.textAlign = "right";
    ctx.fillText("S:" + game.score, W - 6, H - 12);

    // --- Speedometer bar (top-right) -----------------------------------------
    const sw = 70, sx = W - sw - 6, sy = 6;
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(sx - 2, sy - 2, sw + 4, 10);
    const frac = game.speed / MAX_SPEED;
    ctx.fillStyle = frac > 0.85 ? "#f55" : frac > 0.5 ? "#fd3" : "#5d5";
    ctx.fillRect(sx, sy, Math.round(sw * frac), 6);
    ctx.fillStyle = "#fff";
    ctx.font = "7px 'Courier New', monospace";
    ctx.textAlign = "left";
    ctx.fillText("MPH", sx, sy + 16);
    ctx.textAlign = "right";
    ctx.fillText(String(Math.round(frac * 180)), sx + sw, sy + 16);

    // --- Day clock (top-left) ------------------------------------------------
    const tf = game.dayTimer / game.dayLength;
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(6, 6, 70, 6);
    ctx.fillStyle = tf < 0.2 ? "#f55" : "#9cf";
    ctx.fillRect(6, 6, Math.round(70 * tf), 6);
    ctx.fillStyle = "#fff";
    ctx.font = "7px 'Courier New', monospace";
    ctx.textAlign = "left";
    ctx.fillText("TIME LEFT", 6, 20);
  }

  // ---------------------------------------------------------------------------
  // Main loop
  // ---------------------------------------------------------------------------
  let last = performance.now();
  function loop(now) {
    let dt = (now - last) / 1000;
    last = now;
    if (dt > 0.05) dt = 0.05;          // clamp big frame gaps
    update(dt);
    render();
    requestAnimationFrame(loop);
  }

  fitCanvas();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
